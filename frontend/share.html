<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){var t=localStorage.getItem('cardboard_theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Collection – Cardboard</title>
  <link rel="icon" type="image/png" href="/cardboard-icon.png" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <img class="logo-icon" src="/cardboard-icon.png" alt="Cardboard" />
        <span class="logo-text">Cardboard</span>
      </div>
      <span class="share-readonly-badge">Shared Collection (read-only)</span>
    </div>
  </header>

  <main class="main">
    <section id="view-collection" class="view active">
      <div class="collection-toolbar">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="collection-search" class="search-input" placeholder="Search collection…" autocomplete="off" aria-label="Search" />
          <button class="clear-search" id="clear-search" title="Clear search" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="toolbar-controls">
          <div class="sort-group">
            <label class="sort-label" for="sort-by">Sort by</label>
            <select id="sort-by" class="select">
              <option value="name">Name</option>
              <option value="date_added">Date Added</option>
              <option value="user_rating">Rating</option>
              <option value="session_count">Most Played</option>
              <option value="last_played">Last Played</option>
              <option value="min_playtime">Playtime</option>
              <option value="min_players">Players</option>
              <option value="difficulty">Difficulty</option>
              <option value="heat_level">Hot</option>
            </select>
            <button id="sort-dir" class="icon-btn sort-dir-btn" title="Toggle sort direction" data-dir="asc">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
            </button>
          </div>
          <div class="view-toggle">
            <button class="icon-btn active" id="view-grid" title="Grid view">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            </button>
            <button class="icon-btn" id="view-list" title="List view">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="status-pills" id="status-pills">
        <button class="pill active" data-status="all">All</button>
        <button class="pill" data-status="owned">Owned</button>
        <button class="pill" data-status="wishlist">Wishlist</button>
        <button class="pill" data-status="sold">Sold</button>
      </div>

      <div id="mechanics-filter-row" class="filter-tags-row" style="display:none"></div>

      <div id="collection-stats" class="collection-stats"></div>

      <div id="games-container" class="games-grid">
        <div class="loading-spinner">
          <div class="spinner"></div>
          <p>Loading shared collection…</p>
        </div>
      </div>

      <div id="empty-state" class="empty-state" style="display:none">
        <h2>No games found</h2>
        <p>This shared collection is empty.</p>
      </div>
    </section>
  </main>

  <!-- Game Detail Modal (read-only) -->
  <div id="game-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" style="display:none">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-container">
      <div class="modal-inner" id="modal-inner"></div>
    </div>
  </div>

  <div id="toast-container" class="toast-container" role="status" aria-live="polite" aria-atomic="false"></div>

  <footer class="footer">
    <div class="footer-content">
      <span class="footer-link">Powered by Cardboard</span>
    </div>
  </footer>

  <script src="/js/shared-utils.js"></script>
  <script>
    // Minimal API for shared view
    const token = new URLSearchParams(location.search).get('token');
    const staticData = window.__STATIC_COLLECTION__ || null;
    if (!token && !staticData) {
      document.querySelector('.loading-spinner p').textContent = 'Invalid share link.';
    }

    function showToast(msg, type = 'info') {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3500);
    }
    function renderStars(rating) {
      if (!rating) return '';
      const filled = Math.round(rating);
      return Array.from({length:10}, (_,i) =>
        `<svg viewBox="0 0 24 24" class="star${i<filled?' filled':''}"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`
      ).join('');
    }

    // Shared state
    let games = [];
    let viewMode = 'grid';
    let sortBy = 'name';
    let sortDir = 'asc';
    let search = '';
    let statusFilter = 'all';
    let filterMechanics = [];

    function sortGames(arr) {
      const asc = sortDir !== 'desc';
      return [...arr].sort((a, b) => {
        let av, bv;
        if (sortBy === 'name') {
          av = (a.name||'').replace(/^the\s+/i,'').toLowerCase();
          bv = (b.name||'').replace(/^the\s+/i,'').toLowerCase();
        } else if (sortBy === 'session_count') {
          av = a.session_count ?? 0;
          bv = b.session_count ?? 0;
        } else {
          av = a[sortBy] ?? null;
          bv = b[sortBy] ?? null;
        }
        if (av===null && bv===null) return 0;
        if (av===null) return asc ? 1 : -1;
        if (bv===null) return asc ? -1 : 1;
        return asc ? (av < bv ? -1 : av > bv ? 1 : 0) : (av > bv ? -1 : av < bv ? 1 : 0);
      });
    }

    function buildCard(game) {
      const el = document.createElement('div');
      el.className = 'game-card';
      el.dataset.gameId = game.id;
      const players = formatPlayers(game.min_players, game.max_players);
      const playtime = formatPlaytime(game.min_playtime, game.max_playtime);
      const rating = game.user_rating
        ? `${renderStars(game.user_rating)}<span class="rating-num">${game.user_rating}</span>`
        : `<span class="unrated">Unrated</span>`;
      const labels = parseList(game.labels).slice(0,3).map(l => `<span class="label-chip">${escapeHtml(l)}</span>`).join('');
      const status = game.status && game.status !== 'owned' ? `<span class="status-badge status-${escapeHtml(game.status)}">${escapeHtml(game.status.charAt(0).toUpperCase()+game.status.slice(1))}</span>` : '';
      const wishlistExtra = game.status === 'wishlist' && (game.priority || game.target_price) ? `
        <div class="wishlist-card-meta">
          ${game.priority ? `<span class="wishlist-priority-sm">${'★'.repeat(game.priority)}</span>` : ''}
          ${game.target_price ? `<span class="wishlist-price-sm">£${game.target_price.toFixed(2)}</span>` : ''}
        </div>` : '';
      el.innerHTML = `
        <div class="game-card-image">
          ${game.image_url ? `<img src="${escapeHtml(game.image_url)}" alt="" loading="lazy">` : '<div class="placeholder-image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>'}
        </div>
        <div class="game-card-body">
          <div class="game-card-title-row">
            <div class="game-card-title">${escapeHtml(game.name)}</div>
            ${status}
          </div>
          <div class="game-card-meta">
            ${players ? `<span class="chip">${escapeHtml(players)}</span>` : ''}
            ${playtime ? `<span class="chip">${escapeHtml(playtime)}</span>` : ''}
          </div>
          <div class="game-card-footer">
            <div class="rating-row">${rating}</div>
            ${labels ? `<div class="label-chips">${labels}</div>` : ''}
            ${wishlistExtra}
          </div>
        </div>`;
      el.addEventListener('click', () => openGameDetail(game));
      return el;
    }

    function render() {
      const container = document.getElementById('games-container');
      const emptyState = document.getElementById('empty-state');
      const statsEl = document.getElementById('collection-stats');
      const q = search.toLowerCase();
      const filtered = sortGames(games).filter(g => {
        if (statusFilter !== 'all' && g.status !== statusFilter) return false;
        if (q && !g.name.toLowerCase().includes(q)) return false;
        if (filterMechanics.length) {
          const gameMechanics = parseList(g.mechanics);
          if (!filterMechanics.every(m => gameMechanics.includes(m))) return false;
        }
        return true;
      });
      statsEl.textContent = `${pluralize(games.length, 'game')}${filtered.length !== games.length ? `, ${filtered.length} shown` : ''}`;
      container.innerHTML = '';
      container.className = viewMode === 'grid' ? 'games-grid' : 'games-list';
      if (!filtered.length) { emptyState.style.display = 'block'; return; }
      emptyState.style.display = 'none';
      filtered.forEach(g => container.appendChild(buildCard(g)));
    }

    function openGameDetail(game) {
      const modal = document.getElementById('game-modal');
      const inner = document.getElementById('modal-inner');
      const categories = parseList(game.categories);
      const mechanics = parseList(game.mechanics);
      const labels = parseList(game.labels);

      inner.innerHTML = `
        <div class="modal-hero">
          ${fresh_img(game)}
          <button class="modal-close" id="share-modal-close" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="modal-title-row">
            <h2 class="modal-title" id="modal-title">${escapeHtml(game.name)}</h2>
            ${game.year_published ? `<span class="modal-year">${game.year_published}</span>` : ''}
          </div>
          <div class="modal-chips">
            ${game.min_players || game.max_players ? `<span class="chip">${escapeHtml(formatPlayers(game.min_players, game.max_players))}</span>` : ''}
            ${game.min_playtime || game.max_playtime ? `<span class="chip">${escapeHtml(formatPlaytime(game.min_playtime, game.max_playtime))}</span>` : ''}
          </div>
          ${categories.length ? `<div class="modal-section"><div class="section-label">Categories</div><div class="tag-chips">${categories.map(c=>`<span class="tag-chip">${escapeHtml(c)}</span>`).join('')}</div></div>` : ''}
          ${mechanics.length ? `<div class="modal-section"><div class="section-label">Mechanics</div><div class="tag-chips">${mechanics.map(m=>`<span class="tag-chip">${escapeHtml(m)}</span>`).join('')}</div></div>` : ''}
          ${labels.length ? `<div class="modal-section"><div class="section-label">Labels</div><div class="label-chips">${labels.map(l=>`<span class="label-chip">${escapeHtml(l)}</span>`).join('')}</div></div>` : ''}
          ${game.user_rating ? `<div class="modal-section"><div class="section-label">Rating</div><div class="rating-display-only">${renderStars(game.user_rating)}<span class="rating-text">${game.user_rating}/10</span></div></div>` : ''}
          ${game.description ? `<div class="modal-section"><div class="section-label">Description</div><p>${escapeHtml(game.description)}</p></div>` : ''}
          ${game.user_notes ? `<div class="modal-section"><div class="section-label">Notes</div><p class="notes-display">${escapeHtml(game.user_notes)}</p></div>` : ''}
          ${game.status === 'wishlist' && (game.priority || game.target_price) ? `
          <div class="modal-section">
            <div class="section-label">Wishlist Info</div>
            <div class="wishlist-info-row">
              ${game.priority ? `<span class="wishlist-priority">Priority: ${'★'.repeat(game.priority)}${'☆'.repeat(5-game.priority)}</span>` : ''}
              ${game.target_price ? `<span class="wishlist-target-price">Target: £${game.target_price.toFixed(2)}</span>` : ''}
            </div>
          </div>` : ''}
          ${!staticData ? `<div class="modal-section want-to-play-section" id="want-to-play-section">
            ${localStorage.getItem('wtp_' + token + '_' + game.id) ? '<p class="wtp-already-sent">✓ You already requested this game!</p>' : '<button class="btn btn-secondary" id="want-to-play-btn">🙋 Want to Play</button>'}
            <div id="want-to-play-form" style="display:none">
              <div class="form-group" style="margin-top:8px">
                <input type="text" id="wtp-name" class="input" placeholder="Your name (optional)" maxlength="100" />
              </div>
              <div class="form-group" style="margin-top:6px">
                <textarea id="wtp-message" class="input" placeholder="Message (optional)" maxlength="500" rows="3" style="resize:vertical;width:100%;box-sizing:border-box"></textarea>
              </div>
              <div style="display:flex;gap:8px;margin-top:6px">
                <button class="btn btn-primary" id="wtp-submit-btn">Send Request</button>
                <button class="btn btn-ghost" id="wtp-cancel-btn">Cancel</button>
              </div>
            </div>
          </div>` : ''}
          ${game.bgg_id ? `
          <div class="modal-section">
            <div class="section-label">Share</div>
            <div class="share-buttons-row">
              <button class="btn btn-secondary" id="share-bgg-wa-btn">
                <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14" style="margin-right:5px;vertical-align:middle"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.5 2C6.262 2 2 6.262 2 11.5c0 1.865.518 3.609 1.42 5.101L2 22l5.578-1.395A9.45 9.45 0 0 0 11.5 21C16.738 21 21 16.738 21 11.5S16.738 2 11.5 2zm0 17.25a7.73 7.73 0 0 1-3.944-1.076l-.283-.168-2.933.733.766-2.855-.185-.295A7.718 7.718 0 0 1 3.75 11.5C3.75 7.226 7.226 3.75 11.5 3.75S19.25 7.226 19.25 11.5 15.774 19.25 11.5 19.25z"/></svg>
                WhatsApp
              </button>
              <button class="btn btn-secondary" id="share-bgg-signal-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="margin-right:5px;vertical-align:middle"><path d="M4 12v1a8 8 0 0 0 8 8h1"/><path d="M20 12v-1a8 8 0 0 0-8-8h-1"/><path d="M12 4V2"/><path d="M12 22v-2"/><path d="M4.93 4.93l-1.42-1.42"/><path d="M19.07 4.93l1.42-1.42"/><path d="M20.49 17.66l1.41 1.41"/><path d="M3.51 17.66l-1.41 1.41"/></svg>
                Signal
              </button>
            </div>
          </div>` : ''}
        </div>`;

      function fresh_img(g) {
        return g.image_url
          ? `<img src="${escapeHtml(g.image_url)}" alt="${escapeHtml(g.name)}" class="modal-hero-image" loading="lazy">`
          : `<div class="modal-hero-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>`;
      }

      inner.querySelector('#share-modal-close').addEventListener('click', closeGameDetail);

      // Want to Play
      const wtpBtn = inner.querySelector('#want-to-play-btn');
      const wtpForm = inner.querySelector('#want-to-play-form');
      const wtpSubmit = inner.querySelector('#wtp-submit-btn');
      const wtpCancel = inner.querySelector('#wtp-cancel-btn');
      if (wtpBtn) {
        wtpBtn.addEventListener('click', () => {
          wtpBtn.style.display = 'none';
          wtpForm.style.display = 'block';
        });
        wtpCancel.addEventListener('click', () => {
          wtpForm.style.display = 'none';
          wtpBtn.style.display = '';
        });
        wtpSubmit.addEventListener('click', async () => {
          wtpSubmit.disabled = true;
          const name = inner.querySelector('#wtp-name').value.trim();
          const msg = inner.querySelector('#wtp-message').value.trim();
          try {
            await fetch(`/api/share/${encodeURIComponent(token)}/games/${game.id}/want-to-play`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ visitor_name: name || null, message: msg || null }),
            }).then(r => { if (!r.ok) return r.json().then(d => { throw new Error(d.detail || `HTTP ${r.status}`); }); });
            try { localStorage.setItem('wtp_' + token + '_' + game.id, '1'); } catch(_) {}
            inner.querySelector('#want-to-play-section').innerHTML = '<p class="wtp-already-sent">✓ Request sent!</p>';
          } catch (err) {
            showToast(err.message || 'Failed to send request', 'error');
            wtpSubmit.disabled = false;
          }
        });
      }

      if (game.bgg_id) {
        const bggUrl = `https://boardgamegeek.com/boardgame/${game.bgg_id}`;
        const bggMsg = `Check out *${escapeHtml(game.name)}* on BoardGameGeek!\n\n${bggUrl}`;

        const waBtn = inner.querySelector('#share-bgg-wa-btn');
        if (waBtn) waBtn.addEventListener('click', () => {
          window.open('https://wa.me/?text=' + encodeURIComponent(bggMsg), '_blank');
        });

        const sigBtn = inner.querySelector('#share-bgg-signal-btn');
        if (sigBtn) sigBtn.addEventListener('click', () => {
          if (navigator.share) {
            navigator.share({ title: game.name + ' on BoardGameGeek', url: bggUrl }).catch(() => {});
          } else {
            navigator.clipboard.writeText(bggMsg)
              .then(() => showToast('Link copied — paste into Signal to share.', 'info'))
              .catch(() => showToast('Could not copy link.', 'error'));
          }
        });
      }

      modal.style.display = 'flex';
      requestAnimationFrame(() => modal.classList.add('open'));
      document.body.style.overflow = 'hidden';
    }

    function closeGameDetail() {
      const modal = document.getElementById('game-modal');
      modal.classList.remove('open');
      setTimeout(() => { modal.style.display = 'none'; document.body.style.overflow = ''; }, 200);
    }

    document.getElementById('modal-backdrop').addEventListener('click', closeGameDetail);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const modal = document.getElementById('game-modal');
        if (modal.classList.contains('open')) closeGameDetail();
      }
    });

    // Controls
    const searchEl = document.getElementById('collection-search');
    const clearBtn = document.getElementById('clear-search');
    searchEl.addEventListener('input', () => { search = searchEl.value; clearBtn.style.display = search ? 'flex' : 'none'; render(); });
    clearBtn.addEventListener('click', () => { search = ''; searchEl.value = ''; clearBtn.style.display = 'none'; render(); });
    document.getElementById('sort-by').addEventListener('change', e => { sortBy = e.target.value; render(); });
    document.getElementById('sort-dir').addEventListener('click', () => {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      document.getElementById('sort-dir').dataset.dir = sortDir;
      render();
    });
    document.getElementById('view-grid').addEventListener('click', () => { viewMode='grid'; document.getElementById('view-grid').classList.add('active'); document.getElementById('view-list').classList.remove('active'); render(); });
    document.getElementById('view-list').addEventListener('click', () => { viewMode='list'; document.getElementById('view-list').classList.add('active'); document.getElementById('view-grid').classList.remove('active'); render(); });
    document.querySelectorAll('#status-pills .pill').forEach(btn => {
      btn.addEventListener('click', () => {
        statusFilter = btn.dataset.status;
        document.querySelectorAll('#status-pills .pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    function buildMechanicsFilter() {
      const row = document.getElementById('mechanics-filter-row');
      if (!row) return;
      const mechSet = new Set();
      games.forEach(g => parseList(g.mechanics).forEach(m => mechSet.add(m)));
      const mechanics = [...mechSet].sort();
      if (!mechanics.length) return;
      row.style.display = 'flex';
      row.innerHTML = mechanics.map(m =>
        `<button class="filter-tag-btn${filterMechanics.includes(m) ? ' active' : ''}" data-mechanic="${escapeHtml(m)}">${escapeHtml(m)}</button>`
      ).join('');
      row.addEventListener('click', e => {
        const btn = e.target.closest('.filter-tag-btn');
        if (!btn) return;
        const m = btn.dataset.mechanic;
        if (filterMechanics.includes(m)) {
          filterMechanics = filterMechanics.filter(x => x !== m);
        } else {
          filterMechanics = [...filterMechanics, m];
        }
        row.querySelectorAll('.filter-tag-btn').forEach(b => b.classList.toggle('active', filterMechanics.includes(b.dataset.mechanic)));
        render();
      });
    }

    // Load shared collection
    if (staticData) {
      games = staticData;
      buildMechanicsFilter();
      render();
      const gameParam = new URLSearchParams(location.search).get('game');
      if (gameParam) {
        const target = games.find(g => g.id === parseInt(gameParam, 10));
        if (target) openGameDetail(target);
      }
    } else if (token) {
      fetch(`/api/share/${encodeURIComponent(token)}/games`)
        .then(r => {
          if (!r.ok) throw new Error(r.status === 404 ? 'Invalid or expired share link.' : `HTTP ${r.status}`);
          return r.json();
        })
        .then(data => {
          games = data;
          buildMechanicsFilter();
          render();
          const gameParam = new URLSearchParams(location.search).get('game');
          if (gameParam) {
            const target = games.find(g => g.id === parseInt(gameParam, 10));
            if (target) openGameDetail(target);
          }
        })
        .catch(err => {
          document.getElementById('games-container').innerHTML = `<div class="loading-spinner"><p style="color:var(--danger)">${escapeHtml(err.message)}</p></div>`;
        });
    }
  </script>
</body>
</html>
